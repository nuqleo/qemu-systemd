MACVTAP="macvtap0"
QEMU_ARCH="x86_64"
QEMU_ARGS="-m 256M \
-smp 2,sockets=1,cores=2,threads=1 \
-cpu host,kvm=off \
-machine type=q35,accel=kvm,usb=on \
-device virtio-scsi,num_queues=4 \
-drive file=/var/adm/chr-7.23.1.vmdk,format=vmdk,if=none,id=hd0,cache=unsafe,discard=unmap,detect-zeroes=unmap \
-device scsi-hd,drive=hd0 \
-netdev tap,fd=3,id=net0 \
-device virtio-net,netdev=net0,speed=10000,duplex=full,mac=00:0c:29:e3:ba:ab \
-device virtio-tablet \
-device virtio-vga \
-display vnc=0.0.0.0:10 \
-serial telnet:0.0.0.0:2010,server,nowait"
