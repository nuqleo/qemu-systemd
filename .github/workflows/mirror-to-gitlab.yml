name: Mirror to GitLab

on:
  push:
    branches: [ "**" ]
  create:
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mirror branches and tags to GitLab
        run: |
          git remote add gitlab "https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/nuqleo/qemu-systemd.git"
          git push --force gitlab 'refs/heads/*:refs/heads/*'
          git push --force gitlab 'refs/tags/*:refs/tags/*'
